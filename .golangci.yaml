version: "2" # golangci-lint v2 스키마 명시

linters:
  default: none # 기존 disable-all: true 와 동일 (모든 기본 린터 비활성화 후 필요한 것만 명시적으로 켬)
  enable:
    - copyloopvar    # [31, 32번] Go 1.22 이상에서의 루프 변수 복사/캡처 문제 방지
    - errcheck       # [52, 53번] 무시된 에러(특히 defer 내부) 검출
    - errorlint      # [48, 49, 50번] %w 래핑 및 errors.Is/As 사용 강제
    - gochecknoinits # [3번] init() 함수 사용 금지 (부작용 최소화)
    - gocritic       # [31, 32번] range 무거운 값 복사 방지 및 성능 최적화 권고
    - govet          # [1, 46번] 섀도잉, defer 파라미터 즉시 평가 등 검사
    - ineffassign    # [32번] 값 갱신 후 사용하지 않는 로직(range 복사본 수정 등) 오류 탐지
    - nakedret       # [43번] 기명 결과 매개변수 사용 시 naked return(명시적 반환 누락) 제한
    - nestif         # [2번] 과도한 if/for 중첩 강제 제한 (멘탈 모델 보호)
    - nilerr         # [44번 연관] if err != nil { return nil } 이라는 치명적 실수 차단
    - nilnil         # [44번] return nil, nil 처럼 결과와 에러가 모두 nil인 모호한 리턴 방지
    - perfsprint     # fmt.Sprintf 대신 전용 함수(strconv 등) 사용 권고 (성능 최적화)
    - prealloc       # [22번] 슬라이스 초기화 시 capacity 할당 강제
    - revive         # [15, 17번] 익스포트 요소 문서화 강제, 범용적인 스타일 교정
    - staticcheck    # [17, 19, 30, 35, 38, 47번] 전반적인 로직 버그 및 안티패턴 탐지
    - unused         # 미사용 상수/변수/함수 정리 (기본적인 성능/가독성 유지)

  # 특정 린터 세부 설정
  settings:
    govet:
      enable:
        - shadow
    errorlint:
      errorf: false     # [48번] 의도적인 %v 사용을 허용하기 위해 %w 강제 끔 (상황에 따라 다르게 처리)
      asserts: true     # [49번] 타입 단언(err.(*MyErr)) 대신 errors.As() 강제
      comparison: true  # [50번] 직접 비교(err == ErrMy) 대신 errors.Is() 강제
    gocritic:
      enabled-checks:
        - rangeValCopy  # [32번] range 루프에서 큰 객체가 복사될 때 경고 (성능 저하 방지)
        - appendAssign  # append 결과를 다른 변수에 엉뚱하게 대입하는 메모리 충돌 실수 방지
    nakedret:
      max-func-lines: 35 # [43번] 함수가 35줄을 넘어가면 기명 반환(naked return)을 금지하여 가독성 확보
    nestif:
      min-complexity: 4  # [2번] 중첩 깊이 허용치 (기본값 5에서 4로 낮추어 더 깐깐하게 관리)
    revive:
      rules:
        - name: exported # [15번] 익스포트된(대문자로 시작하는) 함수, 타입에 주석 강제
          arguments:
            - checkPrivateReceivers
    perfsprint:
      concat-loop: true # [39번] 루프 내 문자열 결합 시 fmt.Sprintf 대신 빌더 사용 권고 강화

  # (마이그레이션 자동 생성) 린터 검사 예외(Exclusion) 처리
  exclusions:
    generated: lax    # Protobuf, Mock 등 자동 생성된 코드는 엄격한 검사 기준 완화
    presets: # 기본적으로 무시할 오탐지(False positive) 및 주석 패턴 프리셋
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths: # 검사에서 아예 제외할 폴더나 파일 경로 (정규식)
      - third_party$
      - builtin$
      - examples$

# (마이그레이션 자동 생성) 코드 포매팅 관련 예외 처리
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
