# golangci-lint v2 config
# gosu-review 스킬과 짝을 이루는 린터 설정.
# 스킬은 "설계/맥락 판단"을, 린터는 "정적 감지 가능한 패턴"을 담당한다.
#
# 커버리지 주석은 다음 규칙을 따른다:
#   ✓ = 해당 룰을 린터가 완전히 커버함 (스킬에서 제외됨)
#   ~ = 부분 커버 (스킬과 중복될 수 있음 — 이중 안전망)
#   아무 표시 없음 = 룰과 직접 매핑되지 않는 일반 품질 린터

version: "2"

linters:
  default: none
  enable:
    - copyloopvar     # Go 1.22+ 루프 변수 per-iteration scope 활용 강제 (Rule 31과는 다른 영역)
    - errcheck        # ✓ Rule 52 (무시된 에러), ~ Rule 53 (defer 에러 일부)
    - errorlint       # ✓ Rule 49 (errors.Is/As 강제), ~ Rule 48 (%w 사용 체크 일부)
    - gochecknoinits  # ✓ Rule 3 (init 함수 사용 제한)
    - gocritic        # ✓ Rule 17 (octalLiteral), ~ Rule 14 (importShadow), ~ Rule 40 (stringXbytes)
    - govet           # ✓ Rule 1 (shadow)
    - ineffassign     # 값 갱신 후 미사용 탐지 (일반 품질)
    - nakedret        # ~ Rule 43 (긴 함수의 naked return 제한 — 부분 커버)
    - nestif          # ~ Rule 2 (중첩 깊이 — 스킬과 이중 안전망)
    - nilerr          # `if err != nil { return nil }` 류 치명 버그 탐지 (Rule 44와는 다름)
    - nilnil          # `return nil, nil` 모호 리턴 탐지 (Rule 44와는 다른 영역이지만 유관)
    - perfsprint      # fmt.Sprintf → strconv 대체 (성능 — 룰 직접 매핑 없음)
    - prealloc        # ~ Rule 22 (슬라이스 cap 지정 — 루프 내 append 한정)
    - revive          # ✓ Rule 15 (문서화), 기타 스타일
    - staticcheck     # ✓ Rule 30 일부 (DeepEqual 권고), 광범위한 안티패턴
    - unused          # 미사용 코드 정리 (일반 품질)

  settings:
    govet:
      enable:
        - shadow      # Rule 1 커버

    errorlint:
      errorf: false   # %v 사용 허용 (Rule 48은 의도적 선택이라 강제하지 않음)
      asserts: true   # Rule 49 — 타입 어설션 대신 errors.As() 강제
      comparison: true # Rule 49 — 직접 비교 대신 errors.Is() 강제

    gocritic:
      enabled-checks:
        - rangeValCopy       # 큰 값 복제 경고 (Rule 31 부분 성능 측면 — 의미 측면은 스킬)
        - appendAssign       # append 오용 (Rule 23 관련 부분 커버)
        - stringXbytes       # Rule 40 — string↔[]byte 불필요 변환
        - octalLiteral       # Rule 17 — 0으로 시작하는 정수 리터럴
        - importShadow       # Rule 14 — 임포트 이름 섀도잉

    nakedret:
      max-func-lines: 35    # 35줄 초과 함수에서 naked return 금지

    nestif:
      min-complexity: 4     # 기본 5에서 4로 — 스킬이 놓치는 경계 케이스 보조

    revive:
      rules:
        - name: "exported"  # Rule 15 — 익스포트된 요소 문서화 강제
          arguments:
            - "checkPrivateReceivers"
            - "sayRepetitiveInsteadOfStutters"

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$

formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$

# ─────────────────────────────────────────────────────────────
# 스킬과 린터의 역할 분담 요약
# ─────────────────────────────────────────────────────────────
#
# 린터가 담당 (스킬 제외):
#   Rule 1  shadow           → govet
#   Rule 3  init 제약         → gochecknoinits
#   Rule 14 변수/패키지 충돌  → gocritic importShadow
#   Rule 15 익스포트 문서화   → revive exported
#   Rule 16 린터/포맷터 사용  → (메타 권고)
#   Rule 17 8진수 리터럴      → gocritic octalLiteral
#   Rule 22 cap 지정          → prealloc (부분)
#   Rule 38 Trim 차이         → gocritic / staticcheck
#   Rule 49 errors.Is/As      → errorlint
#   Rule 52 에러 명시 무시    → errcheck
#
# 스킬이 담당 (린터 못 잡음):
#   Rule 2, 4~13, 18, 20, 21, 23~37, 39~48, 50, 51, 53
#   (설계 판단, 맥락 의존, 의도 vs 코드 불일치 영역)
#
# 이중 안전망 (양쪽 다):
#   Rule 2 (중첩)   - nestif + 스킬 (가드 절 리팩토링 제안)
#   Rule 43 (기명)  - nakedret + 스킬 (섀도잉 버그 판단)
#   Rule 53 (defer 에러) - errcheck + 스킬 (병합 처리 설계)